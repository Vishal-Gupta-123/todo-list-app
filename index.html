<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NexusList | Premium Todo App</title>
    <!-- Font Awesome Icons (v6 free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Space Grotesk for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- SortableJS for drag-and-drop reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- theme toggle + header -->
        <div class="theme-toggle-wrapper">
            <button id="darkModeToggle" class="theme-btn" aria-label="Dark/Light mode">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun" style="display: none;"></i>
            </button>
        </div>

        <div class="todo-card glass-card">
            <div class="card-header">
                <h1><i class="fas fa-check-circle"></i> NexusList</h1>
                <p class="subhead">organize · prioritize · achieve</p>
            </div>

            <!-- Add task section with due date & priority -->
            <div class="add-task-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Write your next task..." autocomplete="off">
                    <div class="inline-controls">
                        <input type="date" id="dueDateInput" class="due-date-picker">
                        <select id="prioritySelect" class="priority-select">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                        <button id="addTaskBtn" class="btn-add"><i class="fas fa-plus"></i> Add</button>
                    </div>
                </div>
            </div>

            <!-- filter & stats bar -->
            <div class="stats-filter-bar">
                <div class="task-stats">
                    <span id="totalTasks">0</span> total · <span id="completedTasks">0</span> completed
                </div>
                <div class="filter-group">
                    <button data-filter="all" class="filter-btn active">All</button>
                    <button data-filter="pending" class="filter-btn">Pending</button>
                    <button data-filter="completed" class="filter-btn">Completed</button>
                </div>
            </div>

            <!-- tasks list container (drag-drop enabled) -->
            <ul id="taskList" class="task-list"></ul>

            <!-- empty state placeholder (controlled via js) -->
            <div id="emptyMessage" class="empty-message" style="display: none;">
                <i class="fas fa-clipboard-list"></i>
                <p>No tasks yet. Create your first task!</p>
            </div>
        </div>
        <footer class="footer-note">
            <span>Drag tasks to reorder</span>  ·  <i class="fas fa-database"></i> Auto-saved
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
